<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Predict Match | ScoreSight</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Navigation -->

    <nav>

        <div class="logo">

            ⚽ ScoreSight

        </div>

        <ul>

            <li><a href="/">Home</a></li>

            <li><a href="/predict">Predict</a></li>

        </ul>

    </nav>

    <!-- Prediction Card -->

    <div class="prediction-container">

        <div class="prediction-card">

            <h1>⚽ EPL Match Prediction</h1>

            <p class="text-center" style="color:#d1d5db; margin-bottom:25px;">
                Choose the Home Team and Away Team to generate an AI-powered prediction.
            </p>

            {% if error %}

            <div class="error-message">

                {{ error }}

            </div>

            {% endif %}

            <form method="POST" id="predictionForm">

                <!-- Home Team -->

                <label>🏠 Home Team</label>

                <select name="home_team" required>

                    <option value="" disabled selected>Select Home Team</option>

                    {% for team in teams %}

                    <option value="{{team}}">

                        {{team}}

                    </option>

                    {% endfor %}

                </select>

                <!-- Away Team -->

                <label>✈️ Away Team</label>

                <select name="away_team" required>

                    <option value="" disabled selected>Select Away Team</option>

                    {% for team in teams %}

                    <option value="{{team}}">

                        {{team}}

                    </option>

                    {% endfor %}

                </select>

                <button type="submit" id="predictBtn">

                    🤖 Predict Match

                </button>

            </form>

        </div>

    </div>

    <footer>

        <p>

            AI Powered Football Prediction | ScoreSight © 2026

        </p>

    </footer>

    <script>

        const form = document.getElementById("predictionForm");
        const btn = document.getElementById("predictBtn");

        form.addEventListener("submit", function () {

            btn.innerHTML = "⏳ Predicting...";

            btn.disabled = true;

        });

    </script>

</body>

</html>
